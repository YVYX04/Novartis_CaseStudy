<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NovaSphere · sage atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NovaSphere — sage atelier palette variant.
   Auto-generated from index.html via palette remap.
   ============================================================ */

:root{
  /* Aurora — retuned to a neutral, sophisticated palette */
  --a-cream:    #E8EDE2;   /* warm sand */
  --a-bronze:   #BCC8AE;   /* warm bronze */
  --a-amber:    #6B8460;   /* burnt amber */
  --a-slate:    #4E5B7A;   /* muted slate blue */
  --a-indigo:   #2E3A56;   /* deep indigo */
  --a-deep:     #1A2338;   /* near-black indigo */

  /* Canvas — warm taupe-cream */
  --cream:        #F3F2EC;
  --cream-2:      #E8E7DF;
  --cream-warm:   #F8F7F2;
  --ink:          #1F2432;   /* deep warm ink */
  --ink-2:        #424859;
  --ink-3:        #76808F;
  --ink-4:        #A7B0BE;
  --line:         rgba(46,58,86, 0.12);
  --line-2:       rgba(46,58,86, 0.06);

  /* Novartis heritage */
  --nv-blue:       #0460A9;

  /* Agent accents — each a distinct but restrained slice */
  --a-briefing:    #4E5B7A;   /* slate blue */
  --a-briefing-2:  #6E7C9A;
  --a-precall:     #6B8460;   /* burnt amber */
  --a-precall-2:   #A8B89A;
  --a-content:     #5A6A8A;   /* muted plum-grey */
  --a-content-2:   #7A8CAD;
  --a-coaching:    #A68B55;   /* warm bronze */
  --a-coaching-2:  #C7AE7D;

  /* Depth */
  --lift-1: 0 1px 2px rgba(31,36,50,0.04), 0 2px 8px rgba(31,36,50,0.04);
  --lift-2: 0 4px 14px rgba(31,36,50,0.07), 0 14px 36px rgba(46,58,86,0.07);
  --lift-3: 0 12px 30px rgba(31,36,50,0.1), 0 30px 80px rgba(46,58,86,0.12);

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;

  /* Neutral aurora gradient — for the sphere only */
  --grad-aurora: linear-gradient(135deg, #A8B89A 0%, #6B8460 28%, #5A6A8A 62%, #4E5B7A 100%);
  --grad-aurora-soft: linear-gradient(135deg, #DCE4CE 0%, #BFCEAE 30%, #A8B5C0 62%, #7A8CAD 100%);
}

*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--cream); color:var(--ink); overflow:hidden; -webkit-font-smoothing:antialiased; font-feature-settings:'ss01','cv11'; }
button,input,select,textarea{ font:inherit; color:inherit; }
button{ cursor:pointer; border:none; background:none; }

#app{ position:relative; width:100vw; height:100vh; overflow:hidden; isolation:isolate; }

/* Ambient background — soft neutral wash */
#app::before{
  content:'';
  position:absolute; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 8% -6%, rgba(107,132,96,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 95% 5%, rgba(90,106,138,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 70% 55% at 50% 115%, rgba(78,91,122,0.08) 0%, transparent 55%),
    linear-gradient(180deg, #F8F7F2 0%, #F3F2EC 60%, #DEDDD3 100%);
}
#app::after{
  content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
  background-image:
    radial-gradient(rgba(46,58,86,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 30%, transparent 90%);
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 30%, transparent 90%);
  opacity:0.6;
}

.screen{ position:absolute; inset:0; z-index:1; }

/* ============================================================
   LOGO
   ============================================================ */
.ns-logo{ display:inline-flex; align-items:center; gap:12px; }
.ns-logo-mark{ width:38px; height:38px; position:relative; flex-shrink:0; }
.ns-logo-mark svg{ width:100%; height:100%; display:block; overflow:visible; }
.ns-logo-text{ display:flex; flex-direction:column; line-height:1; }
.ns-logo-title{ font-family:'Inter',sans-serif; font-weight:800; font-size:18px; letter-spacing:-0.015em; color:var(--ink); }
.ns-logo-sub{ font-family:'JetBrains Mono',monospace; font-weight:500; font-size:9px; letter-spacing:0.3em; color:var(--ink-3); margin-top:4px; text-transform:uppercase; }

/* ============================================================
   SCREEN 1 — WELCOME
   ============================================================ */
#welcome{
  background:
    radial-gradient(ellipse 80% 70% at 50% 45%, #F8F7F2 0%, #D2D0C4 50%, #BDBBAE 100%);
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  overflow:hidden;
}
#welcome.hidden{ opacity:0; pointer-events:none; transition:opacity 0.7s ease; }

/* Hero sphere — neutral but richly dimensional */
.w-sphere{
  position:absolute; top:50%; left:50%;
  width:min(56vmin,500px); height:min(56vmin,500px);
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 32% 28%, rgba(255,255,255,0.85) 0%, transparent 35%),
    radial-gradient(circle at 40% 35%, #E4E9D8 0%, #A8B89A 15%, #6B8460 38%, #5A6A8A 65%, #2E3A56 92%, #15192A 100%);
  box-shadow:
    inset -30px -60px 120px rgba(28,31,46,0.5),
    inset 10px 20px 60px rgba(255,255,255,0.12),
    0 60px 140px rgba(46,58,86,0.3),
    0 0 220px rgba(90,106,138,0.25),
    0 20px 60px rgba(107,132,96,0.2);
  animation: sphere-breathe 5s ease-in-out infinite alternate;
}
.w-sphere::after{
  content:''; position:absolute; inset:0; border-radius:50%;
  background: radial-gradient(ellipse 55% 35% at 32% 24%, rgba(255,255,255,0.5) 0%, transparent 65%);
}
@keyframes sphere-breathe{
  from{ transform:translate(-50%,-50%) scale(1); filter:brightness(1); }
  to{   transform:translate(-50%,-50%) scale(1.04); filter:brightness(1.06); }
}

.w-ring{
  position:absolute; top:50%; left:50%;
  border-radius:50%;
  transform:translate(-50%,-50%) rotate(-22deg);
  pointer-events:none;
}
.w-ring-main{
  width:min(85vmin,780px);
  height:min(32vmin,290px);
  border: 2.5px solid transparent;
  background: linear-gradient(135deg, #A8B89A 0%, #6B8460 30%, #5A6A8A 60%, #4E5B7A 100%) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  filter: drop-shadow(0 0 20px rgba(90,106,138,0.3));
  animation: ring-spin 40s linear infinite;
}
.w-ring-outer{
  width:min(125vmin,1150px);
  height:min(48vmin,440px);
  border: 1px dashed rgba(46,58,86,0.22);
  animation: ring-spin 60s linear infinite reverse;
}
@keyframes ring-spin{ to{ transform:translate(-50%,-50%) rotate(338deg); } }

.w-spark{
  position:absolute; top:50%; left:50%;
  width:14px; height:14px; border-radius:50%;
  background: radial-gradient(circle, #E4E9D8, #A8B89A);
  box-shadow: 0 0 20px #A8B89A, 0 0 40px #6B8460, 0 0 80px rgba(107,132,96,0.5);
  transform: translate(-50%,-50%);
  animation: spark-orbit 12s linear infinite;
}
@keyframes spark-orbit{
  from{ transform: translate(-50%,-50%) rotate(0deg) translateX(min(42vmin,390px)) rotate(0deg); }
  to  { transform: translate(-50%,-50%) rotate(360deg) translateX(min(42vmin,390px)) rotate(-360deg); }
}

.w-content{
  position:relative; z-index:3;
  display:flex; flex-direction:column; align-items:center;
  padding:40px;
  padding-top: min(50vmin, 460px);
}
.w-chip{
  display:flex; align-items:center; gap:10px;
  padding:8px 16px 8px 10px;
  border-radius:100px;
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border:1px solid rgba(46,58,86,0.15);
  box-shadow: 0 6px 24px rgba(46,58,86,0.08);
  margin-bottom:28px;
  opacity:0; animation: fade-drop 0.6s ease 0.2s forwards;
}
.w-chip-dot{ width:6px; height:6px; border-radius:50%; background:#6B8460; box-shadow:0 0 10px #6B8460; animation: pulse 1.6s ease-in-out infinite; }
.w-chip-text{ font-size:11px; font-weight:600; letter-spacing:0.18em; color:var(--ink-2); text-transform:uppercase; font-family:'JetBrains Mono',monospace; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.4} }

.w-headline{
  text-align:center; opacity:0;
  animation: hero-appear 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
}
@keyframes hero-appear{
  from{ opacity:0; transform:scale(0.88); filter:blur(18px); }
  to  { opacity:1; transform:scale(1); filter:blur(0); }
}
.w-eyebrow{
  font-family:'Instrument Serif',serif; font-style:italic;
  font-size:28px; font-weight:400; color:#F8F7F2;
  margin-bottom:4px; letter-spacing:-0.01em;
  text-shadow: 0 2px 24px rgba(31,36,50,0.45), 0 0 40px rgba(31,36,50,0.35);
}
.w-name{
  font-family:'Inter',sans-serif;
  font-size:clamp(72px, 9.5vw, 128px);
  font-weight:800; letter-spacing:-0.05em; line-height:0.95;
  color:transparent;
  background: var(--grad-aurora);
  -webkit-background-clip: text; background-clip: text;
  filter: drop-shadow(0 14px 40px rgba(90,106,138,0.25));
}
.w-tagline{
  margin-top:16px;
  font-size:15px; font-weight:500; color:var(--ink-2);
  opacity:0; animation: fade-drop 0.5s ease 1.4s forwards;
  max-width:460px; text-align:center; line-height:1.5;
}
.w-tagline em{ font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; color:var(--a-amber); }

.w-loader{
  width:280px; height:2px; border-radius:99px;
  background:rgba(46,58,86,0.12);
  margin-top:36px; position:relative; overflow:hidden;
  opacity:0; animation: fade-drop 0.5s ease 1.8s forwards;
}
.w-loader-fill{
  position:absolute; inset:0;
  background: linear-gradient(90deg, transparent, #6B8460 25%, #5A6A8A 50%, #4E5B7A 75%, transparent);
  transform:translateX(-100%);
  animation: loader 2.2s ease-in-out 2s forwards;
}
@keyframes loader{ to{ transform:translateX(100%); } }
.w-loader-text{
  margin-top:14px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.3em; color:var(--ink-4); text-transform:uppercase;
  opacity:0; animation: fade-drop 0.5s ease 2s forwards;
}

.w-skip{
  position:fixed; bottom:28px; right:32px; z-index:10;
  padding:9px 18px; border-radius:99px;
  background:rgba(255,255,255,0.8); backdrop-filter:blur(12px);
  border:1px solid rgba(46,58,86,0.15); color:var(--ink-2);
  font-size:12px; font-weight:600; letter-spacing:0.04em;
  opacity:0; animation: fade-drop 0.4s ease 2.5s forwards;
  transition: all 0.2s ease;
}
.w-skip:hover{ background:#fff; color:var(--a-indigo); transform:translateY(-1px); box-shadow: 0 6px 16px rgba(46,58,86,0.15); }

.w-cobrand{
  position:fixed; bottom:28px; left:32px; z-index:10;
  display:flex; align-items:center; gap:10px;
  font-size:10px; color:var(--ink-3); letter-spacing:0.25em; text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
  opacity:0; animation: fade-drop 0.4s ease 2.4s forwards;
}
.w-cobrand-bar{ width:1px; height:12px; background:rgba(46,58,86,0.25); }
.w-cobrand-novartis{ font-family:'Inter',sans-serif; font-weight:800; letter-spacing:0.08em; color:var(--nv-blue); }

@keyframes fade-drop{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

/* ============================================================
   MAIN SHELL
   ============================================================ */
#main{ display:flex; flex-direction:column; height:100%; opacity:0; pointer-events:none; transition: opacity 0.6s ease; }
#main.visible{ opacity:1; pointer-events:auto; }

.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; position:relative; z-index:10;
  background:rgba(248,247,242,0.78); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom:1px solid var(--line);
}
.topbar-left{ display:flex; align-items:center; gap:32px; }
.topbar-nav{ display:flex; align-items:center; gap:4px; }
.topbar-nav-item{
  padding:8px 14px; border-radius:99px;
  font-size:13px; font-weight:500; color:var(--ink-3);
  transition: all 0.15s ease;
}
.topbar-nav-item:hover{ background:rgba(46,58,86,0.06); color:var(--ink); }
.topbar-nav-item.active{
  background: rgba(46,58,86,0.1);
  color:var(--a-indigo); font-weight:600;
}

.topbar-right{ display:flex; align-items:center; gap:14px; }
.topbar-clock{
  font-family:'JetBrains Mono',monospace;
  font-size:12px; font-weight:500; color:var(--ink-2);
  padding:8px 14px; border-radius:99px;
  background:rgba(46,58,86,0.06);
  letter-spacing:0.08em;
}
.topbar-search{
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:99px;
  background:rgba(255,255,255,0.7); border:1px solid var(--line);
  color:var(--ink-3); font-size:13px; min-width:240px;
}
.topbar-search svg{ width:14px; height:14px; }
.topbar-search kbd{
  margin-left:auto; font-size:10px; padding:2px 6px; border-radius:4px;
  background:rgba(46,58,86,0.08); color:var(--ink-3); font-family:'JetBrains Mono',monospace;
  border:1px solid var(--line);
}
.topbar-avatar{
  width:34px; height:34px; border-radius:50%;
  background: linear-gradient(135deg, #A8B89A, #5A6A8A);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:700; font-size:12px;
  border:2px solid #fff; box-shadow: 0 4px 12px rgba(90,106,138,0.35);
}

.main-content{ flex:1; overflow-y:auto; position:relative; z-index:1; }
.main-content::-webkit-scrollbar{ width:8px; }
.main-content::-webkit-scrollbar-thumb{ background:rgba(46,58,86,0.18); border-radius:99px; }

/* ============================================================
   DASHBOARD
   ============================================================ */
.dashboard{ max-width:1320px; margin:0 auto; padding:44px 40px 80px; }
.dash-hero{ margin-bottom:28px; position:relative; display:grid; grid-template-columns: 1fr auto; gap:32px; align-items:end; }
.dash-eyebrow{
  font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.22em;
  color:var(--ink-4); text-transform:uppercase; margin-bottom:14px;
}
.dash-greeting{
  font-size:clamp(46px, 5.2vw, 68px); font-weight:700;
  letter-spacing:-0.035em; line-height:1.02;
  color:var(--ink); margin-bottom:12px;
}
.dash-greeting em{
  font-family:'Instrument Serif',serif; font-style:italic; font-weight:400;
  background: var(--grad-aurora);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.dash-sub{
  font-size:17px; color:var(--ink-2); max-width:640px; line-height:1.5;
}

/* Mary's rhythm — a personalized daily glance card */
.rhythm{
  background: linear-gradient(160deg, rgba(255,255,255,0.95), rgba(248,247,242,0.75));
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: var(--r-lg);
  padding: 18px 22px;
  min-width: 300px;
  box-shadow: var(--lift-1);
  position:relative; overflow:hidden;
  backdrop-filter: blur(12px);
  cursor:pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  text-align:left; width:100%;
  font-family: inherit;
}
.rhythm:hover{ transform: translateY(-2px); box-shadow: 0 4px 10px rgba(31,36,50,0.06), 0 20px 40px -12px rgba(31,36,50,0.15); border-color: rgba(107,132,96,0.3); }
.rhythm-hint{ margin-top:10px; padding-top:10px; border-top:1px dashed rgba(46,58,86,0.12); font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--a-sage,#6B8460); font-family:'JetBrains Mono',monospace; display:flex; align-items:center; justify-content:space-between; opacity:0.4; transition:opacity 0.2s ease; position:relative; z-index:1; }
.rhythm:hover .rhythm-hint{ opacity:1; }
.rhythm-hint span{ transition: transform 0.2s ease; }
.rhythm:hover .rhythm-hint span{ transform: translateX(4px); }
.rhythm::before{
  content:''; position:absolute; top:0; right:0; width:60%; height:100%;
  background: radial-gradient(ellipse 100% 100% at 100% 0%, rgba(107,132,96,0.15), transparent 60%);
  pointer-events:none;
}
.rhythm-head{ display:flex; align-items:center; gap:8px; font-size:10px; font-weight:700; letter-spacing:0.22em; color:var(--ink-3); text-transform:uppercase; font-family:'JetBrains Mono',monospace; margin-bottom:12px; position:relative; z-index:1; }
.rhythm-head::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--a-amber); box-shadow:0 0 10px var(--a-amber); animation:pulse 1.4s infinite; }
.rhythm-now{ font-size:13px; color:var(--ink); font-weight:600; margin-bottom:4px; position:relative; z-index:1; }
.rhythm-next{ font-size:12px; color:var(--ink-3); position:relative; z-index:1; display:flex; align-items:center; gap:6px; }
.rhythm-next strong{ color:var(--ink-2); font-weight:600; }
.rhythm-streak{ margin-top:12px; padding-top:12px; border-top:1px dashed rgba(46,58,86,0.15); display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--ink-3); position:relative; z-index:1; }
.rhythm-streak-value{ font-size:13px; font-weight:700; color:var(--a-amber); font-variant-numeric:tabular-nums; }
.rhythm-streak-value span{ font-size:10px; color:var(--ink-3); font-weight:500; margin-left:4px; }

/* Stat strip — neutral aurora glass */
.stat-strip{
  display:grid; grid-template-columns:repeat(4,1fr); gap:16px;
  margin-bottom:28px; margin-top:4px;
}

/* ============================================================
   CLUSTER PULSE — live WEC map
   ============================================================ */
.pulse{
  position:relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.88) 0%, rgba(248,247,242,0.75) 100%);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:var(--r-xl);
  padding:26px 28px;
  margin-top:56px;
  margin-bottom:44px;
  box-shadow: var(--lift-2);
  overflow:hidden;
  backdrop-filter: blur(14px);
}
.pulse::before{
  content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
  background:
    radial-gradient(ellipse 40% 60% at 8% 0%, rgba(78,91,122,0.1), transparent 60%),
    radial-gradient(ellipse 40% 60% at 100% 100%, rgba(107,132,96,0.08), transparent 60%);
}
.pulse-head{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px; position:relative; z-index:1; }
.pulse-title{ font-size:18px; font-weight:700; letter-spacing:-0.015em; color:var(--ink); display:flex; align-items:center; gap:10px; }
.pulse-title::before{ content:''; width:8px; height:8px; border-radius:50%; background:var(--a-amber); box-shadow:0 0 12px var(--a-amber); animation:pulse 1.6s ease-in-out infinite; }
.pulse-sub{ font-size:13px; color:var(--ink-3); margin-top:4px; }
.pulse-legend{ display:flex; gap:14px; font-size:11px; font-weight:500; color:var(--ink-3); font-family:'JetBrains Mono',monospace; letter-spacing:0.08em; text-transform:uppercase; }
.pulse-legend-item{ display:flex; align-items:center; gap:6px; }
.pulse-legend-dot{ width:7px; height:7px; border-radius:50%; }
.pulse-legend-dot.on{ background:#4F7A4A; box-shadow:0 0 8px rgba(79,122,74,0.6); }
.pulse-legend-dot.risk{ background:#6B8460; box-shadow:0 0 8px rgba(107,132,96,0.6); }
.pulse-legend-dot.paused{ background:#A7B0BE; }

.pulse-body{
  position:relative; z-index:1;
  display:grid; grid-template-columns: 1.15fr 1fr; gap:28px; align-items:center;
}

/* SVG map wrapper */
.pulse-map{
  position:relative;
  aspect-ratio: 1.45 / 1;
  border-radius:var(--r-lg);
  background:
    radial-gradient(ellipse 60% 55% at 50% 45%, rgba(78,91,122,0.08), transparent 70%),
    linear-gradient(160deg, rgba(248,247,242,0.6), rgba(229,222,210,0.35));
  border:1px solid var(--line-2);
  overflow:hidden;
}
.pulse-map svg{ width:100%; height:100%; display:block; }
.pulse-country-path{
  fill: rgba(78,91,122,0.12);
  stroke: rgba(46,58,86,0.22);
  stroke-width: 0.5;
  transition: fill 0.25s ease;
  cursor:pointer;
}
.pulse-country-path:hover{ fill: rgba(78,91,122,0.22); }
.pulse-country-path.on{ fill: rgba(79,122,74,0.22); stroke: rgba(79,122,74,0.45); }
.pulse-country-path.on:hover{ fill: rgba(79,122,74,0.35); }
.pulse-country-path.risk{ fill: rgba(107,132,96,0.28); stroke: rgba(107,132,96,0.55); }
.pulse-country-path.risk:hover{ fill: rgba(107,132,96,0.42); }
.pulse-country-path.paused{ fill: rgba(168,162,176,0.28); stroke: rgba(168,162,176,0.55); stroke-dasharray: 1.5 1.5; }

.pulse-dot{
  position:absolute;
  width:12px; height:12px; border-radius:50%;
  transform: translate(-50%,-50%);
  cursor:pointer;
  z-index:2;
}
.pulse-dot::before{
  content:''; position:absolute; inset:0; border-radius:50%;
  background: var(--d-color, #4F7A4A);
  box-shadow: 0 0 0 2px #fff, 0 4px 10px var(--d-shadow, rgba(79,122,74,0.6));
  z-index:2;
}
.pulse-dot::after{
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background: var(--d-color, #4F7A4A);
  opacity:0.4;
  animation: pulse-ring 2.4s ease-out infinite;
}
.pulse-dot.risk{ --d-color:#6B8460; --d-shadow: rgba(107,132,96,0.6); }
.pulse-dot.paused{ --d-color:#A7B0BE; --d-shadow: rgba(168,162,176,0.4); }
.pulse-dot.paused::after{ animation:none; }
@keyframes pulse-ring{
  0%{ transform:scale(0.9); opacity:0.5; }
  70%{ transform:scale(2.4); opacity:0; }
  100%{ transform:scale(2.4); opacity:0; }
}
.pulse-dot-label{
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  font-size:10px; font-weight:700; color:var(--ink); white-space:nowrap;
  font-family:'JetBrains Mono',monospace; letter-spacing:0.04em;
  background: rgba(255,255,255,0.92); padding:2px 6px; border-radius:6px;
  border:1px solid var(--line-2); pointer-events:none;
  opacity:0; transition: opacity 0.15s;
}
.pulse-dot:hover .pulse-dot-label{ opacity:1; }

/* Ticker / country list on the right */
.pulse-list{ display:flex; flex-direction:column; gap:6px; }
.pulse-row{
  display:grid; grid-template-columns: 24px 1fr auto auto; gap:12px; align-items:center;
  padding:10px 12px; border-radius:var(--r-sm);
  transition: background 0.15s ease;
  cursor:pointer;
  border: 1px solid transparent;
}
.pulse-row:hover{ background: rgba(255,255,255,0.7); border-color: var(--line-2); }
.pulse-row-flag{ font-size:18px; line-height:1; }
.pulse-row-name{ font-size:13px; font-weight:600; color:var(--ink); }
.pulse-row-sub{ font-size:11px; color:var(--ink-3); margin-top:1px; }
.pulse-row-rx{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; }
.pulse-row-rx.up{ color:#4F7A4A; }
.pulse-row-rx.down{ color:#6B8460; }
.pulse-row-rx.flat{ color:var(--ink-4); }
.pulse-row-status{ width:8px; height:8px; border-radius:50%; }
.pulse-row-status.on{ background:#4F7A4A; box-shadow:0 0 8px rgba(79,122,74,0.5); }
.pulse-row-status.risk{ background:#6B8460; box-shadow:0 0 8px rgba(107,132,96,0.5); }
.pulse-row-status.paused{ background:#A7B0BE; }

/* Footnote strip */
.pulse-foot{
  margin-top:16px; padding-top:14px; border-top:1px dashed var(--line-2);
  display:flex; align-items:center; justify-content:space-between;
  font-size:12px; color:var(--ink-3); position:relative; z-index:1;
}
.pulse-foot strong{ color:var(--a-amber); font-weight:700; }
.pulse-foot-cta{ padding:6px 12px; border-radius:99px; background: var(--ink); color:#fff; font-size:11px; font-weight:600; letter-spacing:0.04em; }
.pulse-foot-cta:hover{ background: var(--a-indigo); }
/* ============================================================
   STAT CARDS — editorial, asymmetric, mini-viz
   ============================================================ */
.stat-card{
  position:relative;
  padding:22px 22px 18px;
  border-radius:var(--r-lg);
  background:
    linear-gradient(165deg, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.78) 100%);
  color:var(--ink); text-align:left;
  overflow:hidden;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1),
              box-shadow 0.3s ease,
              border-color 0.3s ease;
  box-shadow:
    0 1px 2px rgba(31,36,50,0.04),
    0 14px 34px -10px rgba(31,36,50,0.1),
    inset 0 1px 0 rgba(255,255,255,0.9);
  border: 1px solid rgba(46,58,86,0.08);
  cursor:pointer;
  display:flex; flex-direction:column; gap:14px;
  min-height:182px;
  backdrop-filter: blur(12px);
}
.stat-card::before{
  content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
  background: radial-gradient(ellipse 130% 95% at 115% -12%, var(--glow,rgba(90,106,138,0.22)) 0%, transparent 55%);
  z-index:0;
}
.stat-card::after{
  content:''; position:absolute; left:18px; right:18px; bottom:0; height:2px;
  background: var(--glow-line,rgba(90,106,138,0.6));
  border-radius:2px 2px 0 0;
  transform-origin: left center;
  transform: scaleX(0);
  opacity:0;
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease;
}
.stat-card:hover{
  transform: translateY(-4px);
  border-color: rgba(46,58,86,0.14);
  box-shadow:
    0 4px 10px rgba(31,36,50,0.06),
    0 32px 60px -14px rgba(31,36,50,0.18),
    inset 0 1px 0 rgba(255,255,255,0.95);
}
.stat-card:hover::after{ transform: scaleX(1); opacity:1; }
.stat-card:active{ transform: translateY(-1px); }

.stat-head{
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:12px; position:relative; z-index:1;
}
.stat-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--ink-3); line-height:1.35;
  padding-top:8px;
  max-width:150px;
}
.stat-icon-wrap{
  width:38px; height:38px; border-radius:50%;
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.85), rgba(255,255,255,0.2) 60%),
    linear-gradient(140deg, var(--glow-line,rgba(90,106,138,0.65)) 0%, var(--glow,rgba(90,106,138,0.35)) 100%);
  border: 1px solid rgba(255,255,255,0.6);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:
    0 6px 14px var(--glow,rgba(90,106,138,0.25)),
    inset 0 1px 0 rgba(255,255,255,0.5);
  position:relative; z-index:1;
}
.stat-icon-wrap svg{ width:17px; height:17px; color:#fff; stroke-width:2; }

.stat-mid{
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:14px; position:relative; z-index:1;
  margin-top:auto;
  padding-bottom:4px;
}
.stat-value{
  font-family:'Instrument Serif',serif;
  font-size:56px; font-weight:400; font-style:italic;
  letter-spacing:-0.03em; line-height:0.9; color:var(--ink);
  font-feature-settings:'tnum';
}

/* Mini-viz variants */
.stat-viz{
  flex-shrink:0;
  display:flex; align-items:flex-end; justify-content:flex-end;
  gap:3px;
  margin-bottom:6px;
}
.viz-dots{ display:flex; gap:5px; align-items:center; height:22px; }
.viz-dots span{
  width:9px; height:9px; border-radius:50%;
  background: var(--glow-line, rgba(90,106,138,0.55));
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
}
.viz-dots span.muted{ background: rgba(46,58,86,0.12); box-shadow:none; }
.viz-dots span.risk{ background:#A68B55; }
.viz-dots span.paused{ background: rgba(46,58,86,0.2); }

.viz-spark{ width:82px; height:26px; }

.viz-ring{ width:38px; height:38px; position:relative; }
.viz-ring svg{ width:100%; height:100%; transform:rotate(-90deg); }
.viz-ring .track{ stroke: rgba(46,58,86,0.1); fill:none; }
.viz-ring .fill{ stroke: var(--glow-line, rgba(90,106,138,0.8)); stroke-linecap:round; fill:none; }
.viz-ring .label{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700;
  color:var(--ink-2);
}
.viz-clock{ display:flex; flex-direction:column; gap:3px; align-items:flex-end; }
.viz-clock span{
  font-family:'JetBrains Mono',monospace; font-size:9.5px; font-weight:600;
  letter-spacing:0.04em; color:var(--ink-3);
  padding:2px 6px; border-radius:4px;
  background: rgba(46,58,86,0.06);
}
.viz-clock span.hot{
  background: var(--glow,rgba(166,139,85,0.25));
  color:var(--ink);
}

.stat-foot{
  display:flex; align-items:center; justify-content:space-between;
  font-size:10.5px; font-family:'JetBrains Mono',monospace;
  color:var(--ink-3); letter-spacing:0.04em;
  position:relative; z-index:1;
  padding-top:12px;
  border-top:1px dashed rgba(46,58,86,0.1);
  text-transform:uppercase;
}
.stat-delta{ font-weight:600; }
.stat-delta.up{ color:#4F7A4A; }
.stat-delta.down{ color:#A68B55; }
.stat-delta.warn{ color:#A68B55; }
.stat-jump{
  display:inline-flex; align-items:center; gap:5px;
  color:var(--ink-3); opacity:0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  transform: translateX(-4px);
  font-weight:600;
}
.stat-card:hover .stat-jump{ opacity:1; transform:translateX(0); color:var(--ink); }

.section-header{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px; }
.section-title{ font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); }
.section-subtitle{ font-size:13px; color:var(--ink-3); margin-top:4px; }
.section-link{ font-size:13px; font-weight:600; color:var(--a-indigo); padding:6px 12px; border-radius:99px; transition: background 0.15s; }
.section-link:hover{ background:rgba(46,58,86,0.08); }

/* Agent grid — neutral aurora tiles */
.agent-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:18px; }
@media (max-width: 1180px){ .agent-grid{ grid-template-columns:repeat(2, 1fr); } }
.agent-card{
  position:relative;
  padding:26px;
  border-radius:var(--r-xl);
  background:
    linear-gradient(160deg,
      color-mix(in srgb, var(--accent,#4E5B7A) 12%, #ffffff) 0%,
      color-mix(in srgb, var(--accent2,#6E7C9A) 6%, #ffffff) 60%,
      #ffffff 100%);
  color:var(--ink); text-align:left; overflow:hidden;
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  box-shadow:
    0 1px 2px rgba(31,36,50,0.04),
    0 18px 40px -12px color-mix(in srgb, var(--accent,#4E5B7A) 25%, transparent),
    inset 0 1px 0 rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.6);
  cursor:pointer;
  min-height:220px;
  display:flex; flex-direction:column; justify-content:space-between;
  backdrop-filter: blur(12px);
}

/* Shimmer sweep across card on hover */
.agent-card .agent-shimmer{
  position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:inherit; z-index:0;
}
.agent-card .agent-shimmer::after{
  content:''; position:absolute; top:-50%; left:-60%; width:60%; height:200%;
  background: linear-gradient(100deg, transparent 20%, rgba(255,255,255,0.55) 50%, transparent 80%);
  transform: rotate(14deg) translateX(0);
  transition: transform 0.9s cubic-bezier(0.16,1,0.3,1);
}
.agent-card:hover .agent-shimmer::after{ transform: rotate(14deg) translateX(380%); }
.agent-card::before{
  content:''; position:absolute; inset:-30px; pointer-events:none; opacity:0.5;
  background:
    radial-gradient(ellipse 55% 50% at 100% 0%, var(--accent,#4E5B7A) 0%, transparent 55%),
    radial-gradient(ellipse 45% 50% at 0% 100%, var(--accent2,#6E7C9A) 0%, transparent 55%);
  filter: blur(30px);
  transition: opacity 0.3s ease;
}
.agent-card::after{
  content:''; position:absolute; top:-50px; right:-50px;
  width:180px; height:180px; border-radius:50%; pointer-events:none;
  background:
    radial-gradient(circle at 40% 35%, rgba(255,255,255,0.6) 0%, transparent 35%),
    radial-gradient(circle, var(--accent,#4E5B7A) 0%, var(--accent2,#6E7C9A) 55%, transparent 90%);
  opacity:0.3;
  filter: blur(6px);
  transition: all 0.4s ease;
}
.agent-card:hover{
  transform:translateY(-4px);
  box-shadow:
    0 4px 10px rgba(31,36,50,0.06),
    0 40px 70px -15px color-mix(in srgb, var(--accent,#4E5B7A) 40%, transparent),
    0 0 60px -10px var(--accent,#4E5B7A);
}
.agent-card:hover::before{ opacity:0.8; }
.agent-card:hover::after{ opacity:0.5; transform:scale(1.1) rotate(12deg); }
.agent-card.live::before{ opacity:0.8; animation: accent-drift 8s ease-in-out infinite alternate; }
@keyframes accent-drift{ from{ transform:translate(-14px,-10px) scale(1); } to{ transform:translate(12px,10px) scale(1.1); } }

.agent-top{ display:flex; align-items:flex-start; justify-content:space-between; position:relative; z-index:2; }
.agent-mark{
  width:54px; height:54px; border-radius:16px;
  background: linear-gradient(140deg, var(--accent,#4E5B7A), var(--accent2,#6E7C9A));
  border: 1px solid rgba(255,255,255,0.6);
  display:flex; align-items:center; justify-content:center;
  box-shadow:
    0 12px 28px color-mix(in srgb, var(--accent,#4E5B7A) 50%, transparent),
    inset 0 1px 0 rgba(255,255,255,0.4);
  position:relative; overflow:hidden;
}
.agent-mark::before{
  content:''; position:absolute; inset:-40%;
  background: conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.5) 60deg, transparent 120deg, transparent 360deg);
  animation: mark-halo 6s linear infinite;
  opacity:0.6;
}
.agent-card:hover .agent-mark::before{ opacity:1; animation-duration: 2.5s; }
@keyframes mark-halo{ to{ transform: rotate(360deg); } }
.agent-mark svg{ width:26px; height:26px; color:#fff; position:relative; z-index:1; }

.agent-pill{
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase;
  padding:6px 11px; border-radius:99px;
  background: rgba(255,255,255,0.7); backdrop-filter:blur(6px);
  color:var(--ink-2);
  border:1px solid rgba(46,58,86,0.15);
}
.agent-pill.live{
  background: linear-gradient(135deg, #6B8460, #A8B89A);
  color:#fff; border-color:transparent;
  box-shadow: 0 4px 14px rgba(107,132,96,0.4);
}
.agent-pill.live::before{ content:''; display:inline-block; width:6px; height:6px; border-radius:50%; background:#fff; box-shadow:0 0 10px #fff; margin-right:6px; animation: pulse 1.4s ease-in-out infinite; vertical-align:middle; }

.agent-body{ position:relative; z-index:2; margin-top:26px; }
.agent-name{ font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); margin-bottom:6px; }
.agent-desc{ font-size:14px; line-height:1.5; color:var(--ink-2); max-width:85%; }

.agent-bottom{ display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; margin-top:16px; }
.agent-status{ font-size:10px; color:var(--ink-3); font-family:'JetBrains Mono',monospace; letter-spacing:0.18em; font-weight:600; }
.agent-enter{
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:99px;
  background: rgba(255,255,255,0.7); backdrop-filter:blur(6px);
  border:1px solid rgba(46,58,86,0.15);
  color:var(--ink); font-size:13px; font-weight:600;
  transition: all 0.2s ease;
}
.agent-card:hover .agent-enter{
  background: var(--ink); color:#fff; border-color:var(--ink);
  transform: translateX(2px);
}

/* Focus strip */
.focus-strip{
  margin-top:40px; padding:22px; border-radius:var(--r-lg);
  background:rgba(255,255,255,0.7); backdrop-filter:blur(12px);
  border:1px solid var(--line);
  display:grid; grid-template-columns: auto 1fr auto; gap:20px;
  align-items:center; box-shadow: var(--lift-1);
  position:relative; overflow:hidden;
}
.focus-strip::before{
  content:''; position:absolute; top:0; right:0; width:40%; height:100%;
  background: radial-gradient(ellipse 100% 100% at 100% 50%, rgba(107,132,96,0.12), transparent 70%);
  pointer-events:none;
}
.focus-mark{
  width:44px; height:44px; border-radius:12px;
  background: var(--grad-aurora);
  display:flex; align-items:center; justify-content:center;
  color:#fff; box-shadow: 0 8px 22px rgba(90,106,138,0.35);
  position:relative; z-index:1;
}
.focus-body{ position:relative; z-index:1; }
.focus-body h4{ font-size:14px; font-weight:700; color:var(--ink); margin-bottom:2px; }
.focus-body p{ font-size:13px; color:var(--ink-2); }
.focus-cta{ padding:9px 18px; border-radius:99px; background:var(--ink); color:#fff; font-size:12px; font-weight:600; transition: all 0.15s; position:relative; z-index:1; }
.focus-cta:hover{ background:var(--a-indigo); }

/* ============================================================
   INBOX
   ============================================================ */
.inbox{ max-width:1320px; margin:0 auto; padding:36px 40px 80px; display:grid; grid-template-columns: 380px 1fr; gap:28px; }
.inbox-header{ grid-column:1/-1; display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:8px; }
.inbox-title-wrap{ display:flex; align-items:center; gap:14px; }
.inbox-back{ display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:99px; color:var(--ink-3); font-size:13px; font-weight:500; transition: all 0.15s; }
.inbox-back:hover{ background: rgba(46,58,86,0.08); color:var(--a-indigo); }
.inbox-title{ font-size:32px; font-weight:700; letter-spacing:-0.025em; color:var(--ink); }
.inbox-filters{ display:flex; gap:6px; }
.inbox-filter{ padding:6px 12px; border-radius:99px; font-size:12px; font-weight:500; color:var(--ink-3); border:1px solid transparent; }
.inbox-filter.active{ background:#fff; border-color:var(--line); color:var(--ink); box-shadow: var(--lift-1); }

.inbox-list{
  background: rgba(255,255,255,0.75); backdrop-filter:blur(8px);
  border:1px solid var(--line); border-radius:var(--r-lg);
  overflow:hidden; box-shadow: var(--lift-1); height:fit-content;
}
.inbox-item{
  display:flex; flex-direction:column; gap:6px;
  padding:16px 18px; border-bottom:1px solid var(--line-2);
  cursor:pointer; position:relative; transition: background 0.15s ease;
  text-align:left; width:100%;
}
.inbox-item:last-child{ border-bottom:0; }
.inbox-item:hover{ background:rgba(46,58,86,0.04); }
.inbox-item.selected{ background: linear-gradient(90deg, rgba(46,58,86,0.1), rgba(107,132,96,0.05)); }
.inbox-item.selected::before{
  content:''; position:absolute; left:0; top:10px; bottom:10px; width:3px;
  background: var(--grad-aurora);
  border-radius:0 2px 2px 0;
}
.inbox-item-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.inbox-from{ display:flex; align-items:center; gap:8px; font-weight:600; font-size:13px; color:var(--ink); }
.inbox-avatar{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
.inbox-time{ font-size:11px; color:var(--ink-4); font-family:'JetBrains Mono',monospace; }
.inbox-subject{ font-size:13px; color:var(--ink); font-weight:500; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.inbox-item.unread .inbox-subject{ font-weight:600; }
.inbox-preview{ font-size:12px; color:var(--ink-3); line-height:1.4; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
.inbox-tags{ display:flex; gap:4px; flex-wrap:wrap; margin-top:2px; }
.inbox-tag{ font-size:10px; padding:2px 7px; border-radius:99px; background:rgba(46,58,86,0.08); color:var(--ink-3); font-weight:500; }
.inbox-priority-high{ font-size:10px; padding:2px 7px; border-radius:99px; background:rgba(107,132,96,0.18); color:#4A5F40; font-weight:600; letter-spacing:0.03em; }

.inbox-detail{
  background: rgba(255,255,255,0.85); backdrop-filter:blur(8px);
  border:1px solid var(--line); border-radius:var(--r-lg);
  padding:32px; box-shadow: var(--lift-1);
}
.id-header{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px; padding-bottom:20px; border-bottom:1px solid var(--line-2); gap:16px; }
.id-subject{ font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); line-height:1.3; margin-bottom:14px; }
.id-from-row{ display:flex; align-items:center; gap:12px; }
.id-from-info{ display:flex; flex-direction:column; }
.id-from-name{ font-weight:600; font-size:14px; color:var(--ink); }
.id-from-meta{ font-size:12px; color:var(--ink-3); }
.id-time-row{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; font-size:12px; color:var(--ink-3); font-family:'JetBrains Mono',monospace; }
.id-body{ font-size:15px; line-height:1.65; color:var(--ink-2); white-space:pre-wrap; }
.id-attachment{ margin-top:20px; padding:12px 14px; border-radius:var(--r-sm); background:rgba(46,58,86,0.05); border:1px solid var(--line); display:flex; align-items:center; gap:10px; font-size:13px; color:var(--ink-2); }
.id-attachment svg{ color:var(--a-indigo); flex-shrink:0; }

.id-ai{
  margin-top:24px; padding:20px 22px;
  border-radius:var(--r-md);
  background: linear-gradient(135deg, #4E5B7A 0%, #5A6A8A 50%, #6B8460 100%);
  color:#fff; position:relative; overflow:hidden;
  box-shadow: 0 14px 32px rgba(90,106,138,0.25);
}
.id-ai::before{
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 100% 0%, rgba(168,184,154,0.5), transparent 60%),
    radial-gradient(ellipse 50% 70% at 0% 100%, rgba(78,91,122,0.4), transparent 60%);
}
.id-ai::after{
  content:''; position:absolute; top:-40px; right:-40px;
  width:140px; height:140px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.7), rgba(168,184,154,0.5) 40%, transparent 70%);
  filter: blur(4px); opacity:0.5;
}
.id-ai-label{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.22em; opacity:0.85; text-transform:uppercase; margin-bottom:10px; position:relative; z-index:1; display:flex; align-items:center; gap:8px; }
.id-ai-label::before{ content:''; width:6px; height:6px; border-radius:50%; background:#A8B89A; box-shadow:0 0 10px #A8B89A; animation:pulse 1.4s infinite; }
.id-ai-text{ font-size:14px; line-height:1.55; position:relative; z-index:1; }
.id-ai-actions{ display:flex; gap:8px; margin-top:14px; position:relative; z-index:1; }
.id-ai-btn{ padding:8px 14px; border-radius:99px; background:rgba(255,255,255,0.12); color:#fff; font-size:12px; font-weight:600; border:1px solid rgba(255,255,255,0.14); transition: background 0.15s; }
.id-ai-btn:hover{ background:rgba(255,255,255,0.22); }
.id-ai-btn.primary{ background:#fff; color:var(--ink); }

/* ============================================================
   AGENT DETAIL
   ============================================================ */
.agent-page{ max-width:1320px; margin:0 auto; padding:36px 40px 80px; }
.ap-crumbs{ display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:13px; color:var(--ink-3); }
.ap-crumbs button{ color:var(--ink-3); font-size:13px; }
.ap-crumbs button:hover{ color:var(--a-indigo); }
.ap-crumbs-sep{ color:var(--ink-4); }

.ap-hero{
  position:relative;
  border-radius:var(--r-xl);
  background: linear-gradient(135deg,
    var(--accent,#4E5B7A) 0%,
    var(--accent2,#6E7C9A) 60%,
    color-mix(in srgb, var(--accent2,#6E7C9A) 60%, #A8B89A) 100%);
  color:#fff;
  padding:44px;
  overflow:hidden;
  box-shadow:
    0 1px 2px rgba(31,36,50,0.06),
    0 24px 60px -15px color-mix(in srgb, var(--accent,#4E5B7A) 50%, transparent);
  border:1px solid rgba(255,255,255,0.3);
  margin-bottom:28px;
}
.ap-hero::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 65% at 85% -10%, rgba(168,184,154,0.5), transparent 55%),
    radial-gradient(ellipse 40% 55% at 15% 115%, rgba(46,58,86,0.35), transparent 55%);
  animation: accent-drift 10s ease-in-out infinite alternate;
}
.ap-hero::after{
  content:''; position:absolute; top:-80px; right:-60px;
  width:260px; height:260px; border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,0.8) 0%, transparent 40%),
    radial-gradient(circle, #A8B89A 0%, #6B8460 35%, #5A6A8A 70%, transparent 100%);
  filter: blur(2px); opacity:0.5;
  pointer-events:none;
}
.ap-hero-inner{ position:relative; z-index:1; display:grid; grid-template-columns: 80px 1fr auto; gap:24px; align-items:center; }
.ap-hero-mark{ width:80px; height:80px; border-radius:22px; background: linear-gradient(140deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1)); border:1px solid rgba(255,255,255,0.35); display:flex; align-items:center; justify-content:center; box-shadow: 0 16px 36px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.4); position:relative; overflow:hidden; backdrop-filter: blur(8px); }
.ap-hero-mark::before{ content:''; position:absolute; inset:0; background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5), transparent 60%); }
.ap-hero-mark svg{ width:38px; height:38px; color:#fff; position:relative; z-index:1; }
.ap-hero-text h1{ font-size:32px; font-weight:700; letter-spacing:-0.025em; line-height:1.1; margin-bottom:8px; text-shadow:0 2px 20px rgba(0,0,0,0.15); }
.ap-hero-text p{ font-size:15px; color:rgba(255,255,255,0.88); max-width:580px; line-height:1.55; }
.ap-hero-action{ padding:13px 22px; border-radius:99px; background:#fff; color:var(--ink); font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; transition: all 0.2s; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
.ap-hero-action:hover{ transform:translateY(-1px); box-shadow: 0 14px 28px rgba(0,0,0,0.25); }

.ap-grid{ display:grid; grid-template-columns: 320px 1fr; gap:24px; }

.pipeline{
  background:rgba(255,255,255,0.85); backdrop-filter:blur(8px);
  border:1px solid var(--line); border-radius:var(--r-lg);
  padding:22px; box-shadow: var(--lift-1); height:fit-content;
}
.pipeline-title{ font-size:11px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-3); margin-bottom:18px; font-family:'JetBrains Mono',monospace; }
.pipeline-list{ display:flex; flex-direction:column; gap:0; position:relative; }
.pipeline-list::before{ content:''; position:absolute; left:13px; top:14px; bottom:14px; width:2px; background:var(--line-2); }
.pipe-item{ display:flex; gap:14px; padding:8px 0; position:relative; }
.pipe-dot{ width:28px; height:28px; border-radius:50%; background:#fff; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; font-weight:700; color:var(--ink-4); z-index:1; transition: all 0.3s ease; }
.pipe-item.done .pipe-dot{ background:var(--accent,#4E5B7A); border-color:var(--accent,#4E5B7A); color:#fff; }
.pipe-item.active .pipe-dot{ background:#fff; border-color:var(--accent,#4E5B7A); color:var(--accent,#4E5B7A); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent,#4E5B7A) 18%, transparent); animation: dot-pulse 1.5s ease-in-out infinite; }
@keyframes dot-pulse{ 50%{ box-shadow: 0 0 0 9px color-mix(in srgb, var(--accent,#4E5B7A) 8%, transparent); } }
.pipe-body{ flex:1; padding-top:4px; }
.pipe-label{ font-size:13px; font-weight:600; color:var(--ink); }
.pipe-item.pending .pipe-label{ color:var(--ink-3); }
.pipe-detail{ font-size:12px; color:var(--ink-3); margin-top:2px; line-height:1.4; }

.stream{
  background:rgba(255,255,255,0.95); backdrop-filter:blur(8px);
  border:1px solid var(--line); border-radius:var(--r-lg);
  overflow:hidden; box-shadow: var(--lift-2);
}
.stream-header{ padding:16px 22px; border-bottom:1px solid var(--line-2); display:flex; align-items:center; justify-content:space-between; background:rgba(248,247,242,0.6); }
.stream-title{ font-size:13px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:10px; }
.stream-title::before{ content:''; width:8px; height:8px; border-radius:50%; background:var(--accent,#4E5B7A); box-shadow:0 0 12px var(--accent,#4E5B7A); animation:pulse 1.4s infinite; }
.stream-actions{ display:flex; gap:8px; }
.stream-btn{ padding:6px 12px; border-radius:99px; font-size:11px; font-weight:600; color:var(--ink-3); border:1px solid var(--line); background:#fff; transition: all 0.15s; }
.stream-btn:hover{ color:var(--ink); border-color:var(--ink-3); }
.stream-btn.primary{ background:var(--ink); color:#fff; border-color:var(--ink); }
.stream-btn.primary:hover{ background:var(--a-indigo); border-color:var(--a-indigo); color:#fff; }
.stream-body{
  padding:30px;
  font-size:15px; line-height:1.7; color:var(--ink);
  min-height:420px; max-height:640px; overflow-y:auto;
}
.stream-body h2{ font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:20px 0 12px; color:var(--ink); }
.stream-body h2:first-child{ margin-top:0; }
.stream-body h3{ font-size:11px; font-weight:700; margin:20px 0 8px; color:var(--accent,#4E5B7A); text-transform:uppercase; letter-spacing:0.12em; font-family:'JetBrains Mono',monospace; }
.stream-body p{ margin-bottom:10px; color:var(--ink-2); }
.stream-body ul, .stream-body ol{ margin:0 0 14px 22px; }
.stream-body li{ margin-bottom:6px; color:var(--ink-2); }
.stream-body strong{ color:var(--ink); font-weight:700; }
.stream-body code{ font-family:'JetBrains Mono',monospace; font-size:0.88em; padding:1px 5px; border-radius:4px; background:rgba(46,58,86,0.07); color:var(--a-indigo); }
.stream-body blockquote{ margin:16px 0; padding:14px 18px; background: linear-gradient(90deg, rgba(46,58,86,0.07), rgba(107,132,96,0.04)); border-left:3px solid var(--accent,#4E5B7A); border-radius:8px; font-size:14px; color:var(--ink); font-style:italic; }
.stream-cursor{ display:inline-block; width:2px; height:1em; background:var(--accent,#4E5B7A); vertical-align:text-bottom; animation: blink 0.9s steps(2) infinite; }
@keyframes blink{ 50%{ opacity:0; } }

/* ============================================================
   VISUAL OUTPUT BLOCKS — friendly, scannable agent output
   ============================================================ */

/* Hero summary card — the one-line TL;DR */
.vo-tldr{
  display:grid; grid-template-columns: 44px 1fr; gap:14px;
  padding:18px 20px; margin-bottom:22px;
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--accent,#4E5B7A) 8%, #ffffff) 0%,
    color-mix(in srgb, var(--accent2,#6E7C9A) 4%, #ffffff) 100%);
  border:1px solid color-mix(in srgb, var(--accent,#4E5B7A) 18%, var(--line));
  border-radius: var(--r-md);
  position:relative; overflow:hidden;
}
.vo-tldr::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: linear-gradient(180deg, var(--accent,#4E5B7A), var(--accent2,#6E7C9A));
}
.vo-tldr-mark{
  width:44px; height:44px; border-radius:12px;
  background: linear-gradient(135deg, var(--accent,#4E5B7A), var(--accent2,#6E7C9A));
  display:flex; align-items:center; justify-content:center;
  color:#fff; flex-shrink:0;
  box-shadow: 0 6px 16px color-mix(in srgb, var(--accent,#4E5B7A) 35%, transparent);
}
.vo-tldr-mark svg{ width:22px; height:22px; }
.vo-tldr-label{
  font-size:10px; font-weight:700; letter-spacing:0.18em;
  color: var(--accent,#4E5B7A); text-transform:uppercase;
  font-family:'JetBrains Mono',monospace; margin-bottom:4px;
}
.vo-tldr-text{
  font-size:17px; font-weight:500; color:var(--ink); line-height:1.45;
  letter-spacing:-0.01em;
}
.vo-tldr-text strong{ font-weight:700; }

/* Section heading — cleaner than h3 */
.vo-section{ margin:26px 0 14px; display:flex; align-items:center; gap:10px; }
.vo-section-num{
  width:22px; height:22px; border-radius:6px;
  background: color-mix(in srgb, var(--accent,#4E5B7A) 12%, transparent);
  color: var(--accent,#4E5B7A);
  font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace;
}
.vo-section-title{
  font-size:14px; font-weight:700; color:var(--ink);
  letter-spacing:-0.01em;
}
.vo-section-rule{
  flex:1; height:1px;
  background: linear-gradient(90deg, var(--line-2), transparent);
}

/* Stat chips row */
.vo-stats{ display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:10px; margin-bottom:18px; }
.vo-stat{
  padding:14px 16px; border-radius: var(--r-sm);
  background: rgba(255,255,255,0.75);
  border:1px solid var(--line-2);
  position:relative; overflow:hidden;
}
.vo-stat::before{
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--s-accent, var(--accent,#4E5B7A)), transparent);
}
.vo-stat-label{ font-size:10px; font-weight:600; letter-spacing:0.14em; color:var(--ink-3); text-transform:uppercase; font-family:'JetBrains Mono',monospace; margin-bottom:6px; }
.vo-stat-value{ font-size:22px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; line-height:1; }
.vo-stat-delta{ font-size:11px; font-weight:600; margin-top:4px; display:flex; align-items:center; gap:4px; }
.vo-stat-delta.up{ color:#4A5F40; }
.vo-stat-delta.down{ color:#8A3F22; }
.vo-stat-delta.flat{ color:var(--ink-3); }
.vo-stat.ok{ --s-accent:#6B8460; }
.vo-stat.warn{ --s-accent:#B85C3C; }
.vo-stat.paused{ --s-accent:#9A9283; }

/* Action cards — clickable rows */
.vo-actions{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
.vo-action{
  display:grid; grid-template-columns: 32px 1fr auto; gap:14px;
  align-items:center;
  padding:14px 16px; border-radius: var(--r-sm);
  background:#fff; border:1px solid var(--line);
  cursor:pointer; transition: all 0.15s;
  box-shadow: 0 1px 2px rgba(31,36,50,0.04);
  text-align:left; width:100%;
}
.vo-action:hover{
  border-color: var(--accent,#4E5B7A);
  transform: translateY(-1px);
  box-shadow: 0 6px 16px color-mix(in srgb, var(--accent,#4E5B7A) 15%, transparent);
}
.vo-action-mark{
  width:32px; height:32px; border-radius:9px;
  background: color-mix(in srgb, var(--accent,#4E5B7A) 14%, transparent);
  color: var(--accent,#4E5B7A);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.vo-action-mark svg{ width:15px; height:15px; }
.vo-action-mark.done{ background:#E8EEE3; color:#4A5F40; }
.vo-action-mark.warn{ background:#F7E9E2; color:#8A3F22; }
.vo-action-body{ min-width:0; }
.vo-action-label{ font-size:14px; font-weight:600; color:var(--ink); line-height:1.35; margin-bottom:2px; }
.vo-action-detail{ font-size:12px; color:var(--ink-3); line-height:1.4; }
.vo-action-cta{
  padding:7px 14px; border-radius:99px;
  background: var(--accent,#4E5B7A); color:#fff;
  font-size:11px; font-weight:600; letter-spacing:0.02em;
  display:flex; align-items:center; gap:5px;
  flex-shrink:0; transition: all 0.15s;
  pointer-events:none;
}
.vo-action:hover .vo-action-cta{ background: var(--ink); transform: translateX(2px); }
.vo-action-cta svg{ width:11px; height:11px; }
.vo-action-cta.ghost{ background:transparent; color:var(--ink-3); border:1px solid var(--line); }

/* Signal list — for ranked intel items */
.vo-signals{ display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
.vo-signal{
  display:grid; grid-template-columns: 28px 1fr auto; gap:12px;
  padding:12px 14px; border-radius: var(--r-sm);
  background: rgba(255,255,255,0.65);
  border:1px solid var(--line-2);
  align-items:center;
}
.vo-signal-mark{
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
  font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}
.vo-signal.ok .vo-signal-mark{ background:#E8EEE3; color:#4A5F40; }
.vo-signal.warn .vo-signal-mark{ background:#F7E9E2; color:#8A3F22; }
.vo-signal.pause .vo-signal-mark{ background:rgba(46,58,86,0.08); color:var(--ink-3); }
.vo-signal.info .vo-signal-mark{ background: color-mix(in srgb, var(--accent,#4E5B7A) 14%, transparent); color: var(--accent,#4E5B7A); }
.vo-signal-text{ font-size:13.5px; color:var(--ink-2); line-height:1.5; }
.vo-signal-text strong{ color:var(--ink); font-weight:700; }
.vo-signal-meta{
  font-size:11px; font-weight:600; color:var(--ink-3);
  font-family:'JetBrains Mono',monospace; letter-spacing:0.04em;
  flex-shrink:0;
}

/* Quote — the one-liner sign-off */
.vo-quote{
  display:grid; grid-template-columns:28px 1fr; gap:14px;
  margin:22px 0 6px;
  padding:18px 20px; border-radius: var(--r-md);
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--accent2,#6E7C9A) 8%, #ffffff),
    color-mix(in srgb, var(--accent,#4E5B7A) 4%, #ffffff));
  border:1px solid var(--line-2);
}
.vo-quote-mark{
  font-family:'Instrument Serif',serif;
  font-size:48px; line-height:0.8;
  color: var(--accent,#4E5B7A); opacity:0.6;
}
.vo-quote-text{
  font-family:'Instrument Serif',serif;
  font-size:17px; font-style:italic;
  color:var(--ink); line-height:1.5;
  letter-spacing:-0.005em;
}

/* Email / message bubble — for draft responses */
.vo-email{
  margin:14px 0 18px;
  background:#fff; border:1px solid var(--line);
  border-radius: var(--r-md); overflow:hidden;
  box-shadow: var(--lift-1);
}
.vo-email-head{
  padding:12px 16px; border-bottom:1px solid var(--line-2);
  display:flex; align-items:center; justify-content:space-between;
  gap:10px; background: rgba(248,247,242,0.5);
}
.vo-email-meta{ display:flex; align-items:center; gap:10px; font-size:12px; color:var(--ink-3); }
.vo-email-avatar{
  width:26px; height:26px; border-radius:50%;
  background: linear-gradient(135deg, var(--accent,#4E5B7A), var(--accent2,#6E7C9A));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700;
}
.vo-email-from{ font-weight:600; color:var(--ink); }
.vo-email-badge{
  padding:3px 9px; border-radius:99px;
  font-size:10px; font-weight:700; letter-spacing:0.08em;
  text-transform:uppercase; font-family:'JetBrains Mono',monospace;
}
.vo-email-badge.recommended{ background:linear-gradient(135deg,#4A5F40,#6B8460); color:#fff; }
.vo-email-badge.alt{ background: rgba(46,58,86,0.08); color:var(--ink-2); }
.vo-email-subject{
  padding:14px 16px 4px;
  font-size:14px; font-weight:700; color:var(--ink);
  letter-spacing:-0.01em;
}
.vo-email-body{
  padding:4px 16px 16px;
  font-size:13.5px; line-height:1.6; color:var(--ink-2);
  white-space:pre-wrap;
}
.vo-email-body strong{ color:var(--ink); font-weight:600; }
.vo-email-foot{
  padding:10px 16px; border-top:1px solid var(--line-2);
  display:flex; gap:8px; background: rgba(248,247,242,0.4);
}
.vo-email-btn{
  padding:7px 14px; border-radius:99px;
  font-size:11px; font-weight:600;
  border:1px solid var(--line); background:#fff; color:var(--ink-2);
  transition: all 0.15s;
}
.vo-email-btn:hover{ border-color:var(--ink-3); color:var(--ink); }
.vo-email-btn.primary{ background:var(--ink); color:#fff; border-color:var(--ink); }
.vo-email-btn.primary:hover{ background:var(--a-indigo); }

/* Verdict pill — PASS / FAIL for MLR */
.vo-verdict{
  display:flex; align-items:center; gap:14px;
  padding:14px 18px; margin:14px 0 18px;
  border-radius: var(--r-sm); border:1px solid;
  background:#fff;
}
.vo-verdict-pill{
  padding:5px 12px; border-radius:99px;
  font-size:11px; font-weight:800; letter-spacing:0.12em;
  font-family:'JetBrains Mono',monospace;
  display:flex; align-items:center; gap:6px;
  flex-shrink:0;
}
.vo-verdict-pill svg{ width:12px; height:12px; }
.vo-verdict.pass{ border-color:#B5CAA0; background: linear-gradient(135deg, #F0F5EC, #ffffff); }
.vo-verdict.pass .vo-verdict-pill{ background:#4A5F40; color:#fff; }
.vo-verdict.fail{ border-color:#DDB5A0; background: linear-gradient(135deg, #F8EEE7, #ffffff); }
.vo-verdict.fail .vo-verdict-pill{ background:#8A3F22; color:#fff; }
.vo-verdict-text{ font-size:13px; color:var(--ink-2); line-height:1.45; }
.vo-verdict-text strong{ color:var(--ink); font-weight:700; }

/* HCP profile card */
.vo-profile{
  display:grid; grid-template-columns: 56px 1fr;
  gap:16px; padding:18px 20px;
  background: #fff; border:1px solid var(--line);
  border-radius: var(--r-md); margin-bottom:18px;
  box-shadow: var(--lift-1);
}
.vo-profile-avatar{
  width:56px; height:56px; border-radius:50%;
  background: linear-gradient(135deg, var(--accent,#4E5B7A), var(--accent2,#6E7C9A));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:700; letter-spacing:-0.02em;
  box-shadow: 0 4px 12px color-mix(in srgb, var(--accent,#4E5B7A) 25%, transparent);
}
.vo-profile-name{ font-size:17px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; margin-bottom:3px; }
.vo-profile-role{ font-size:12px; color:var(--ink-3); margin-bottom:8px; }
.vo-profile-tags{ display:flex; gap:5px; flex-wrap:wrap; }
.vo-profile-tag{
  padding:3px 9px; border-radius:99px;
  font-size:10px; font-weight:600; letter-spacing:0.04em;
  background: rgba(46,58,86,0.06); color:var(--ink-2);
}
.vo-profile-tag.decile{ background: color-mix(in srgb, var(--accent,#4E5B7A) 12%, transparent); color: var(--accent,#4E5B7A); }

/* Trend sparkline */
.vo-trend{
  display:grid; grid-template-columns: 1fr auto;
  gap:20px; padding:16px 20px; margin-bottom:18px;
  background: #fff; border:1px solid var(--line);
  border-radius: var(--r-md); align-items:center;
  box-shadow: var(--lift-1);
}
.vo-trend-label{ font-size:11px; font-weight:700; letter-spacing:0.14em; color:var(--ink-3); text-transform:uppercase; font-family:'JetBrains Mono',monospace; margin-bottom:4px; }
.vo-trend-values{ display:flex; align-items:baseline; gap:10px; margin-bottom:3px; }
.vo-trend-current{ font-size:28px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; font-variant-numeric:tabular-nums; line-height:1; }
.vo-trend-caption{ font-size:12px; color:var(--ink-3); line-height:1.4; }
.vo-trend-chart{ width:120px; height:42px; flex-shrink:0; }
.vo-trend-chart svg{ width:100%; height:100%; overflow:visible; }

/* Talking points — numbered cards */
.vo-points{ display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
.vo-point{
  display:grid; grid-template-columns: 30px 1fr;
  gap:14px; padding:14px 16px;
  background: #fff; border:1px solid var(--line);
  border-radius: var(--r-sm);
  box-shadow: 0 1px 2px rgba(31,36,50,0.03);
}
.vo-point-num{
  width:30px; height:30px; border-radius:50%;
  background: linear-gradient(135deg, var(--accent,#4E5B7A), var(--accent2,#6E7C9A));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700;
  font-family:'Instrument Serif',serif;
  flex-shrink:0;
  box-shadow: 0 3px 8px color-mix(in srgb, var(--accent,#4E5B7A) 30%, transparent);
}
.vo-point-title{ font-size:14px; font-weight:600; color:var(--ink); margin-bottom:4px; letter-spacing:-0.01em; }
.vo-point-detail{ font-size:13px; color:var(--ink-3); line-height:1.5; }

/* Don't list */
.vo-dont{
  display:flex; flex-direction:column; gap:8px; margin-bottom:18px;
  padding:14px 18px;
  background: linear-gradient(135deg, #FAF4EF, #ffffff);
  border:1px solid #DDB5A0; border-radius: var(--r-sm);
}
.vo-dont-head{ display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; color:#8A3F22; text-transform:uppercase; letter-spacing:0.14em; font-family:'JetBrains Mono',monospace; }
.vo-dont-head svg{ width:14px; height:14px; }
.vo-dont-item{ display:flex; gap:8px; font-size:13px; color:var(--ink-2); line-height:1.5; }
.vo-dont-item::before{ content:'✕'; color:#8A3F22; font-weight:700; flex-shrink:0; }

/* ============================================================
   CALENDAR
   ============================================================ */
.cal{ max-width:1440px; margin:0 auto; padding:36px 40px 80px; display:grid; grid-template-columns: 1fr 380px; gap:28px; }
.cal-header{ grid-column:1/-1; display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:4px; }
.cal-title-wrap{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
.cal-eyebrow{ font-size:11px; font-weight:700; letter-spacing:0.22em; color:var(--ink-3); text-transform:uppercase; font-family:'JetBrains Mono',monospace; margin-bottom:8px; }
.cal-title{ font-size:clamp(36px,4vw,48px); font-weight:700; letter-spacing:-0.03em; color:var(--ink); line-height:1.05; }
.cal-title em{ font-style:italic; font-weight:500; background: linear-gradient(135deg, var(--a-indigo) 0%, var(--a-amber) 100%); -webkit-background-clip:text; background-clip:text; color:transparent; }
.cal-today{ font-size:13px; color:var(--ink-3); }
.cal-today strong{ color:var(--ink); font-weight:600; }
.cal-toolbar{ display:flex; align-items:center; gap:8px; }
.cal-view-toggle{ display:flex; background:rgba(255,255,255,0.7); border:1px solid var(--line); border-radius:99px; padding:3px; box-shadow: var(--lift-1); }
.cal-view-btn{ padding:6px 14px; border-radius:99px; font-size:12px; font-weight:500; color:var(--ink-3); transition: all 0.15s; }
.cal-view-btn.active{ background: var(--ink); color:#fff; box-shadow: 0 4px 12px rgba(31,36,50,0.3); }
.cal-new{
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 16px; border-radius:99px;
  background: var(--grad-aurora); color:#fff;
  font-size:13px; font-weight:600;
  box-shadow: 0 6px 20px rgba(78,91,122,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
  transition: all 0.15s;
}
.cal-new:hover{ transform: translateY(-1px); box-shadow: 0 10px 28px rgba(78,91,122,0.45), inset 0 1px 0 rgba(255,255,255,0.3); }
.cal-new svg{ width:14px; height:14px; }

/* Week strip */
.cal-weekstrip{
  grid-column:1/-1;
  display:grid; grid-template-columns: repeat(7, 1fr); gap:10px;
  margin: 8px 0 16px;
}
.cal-day{
  background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
  border:1px solid var(--line); border-radius: var(--r-md);
  padding: 12px 14px; text-align:left;
  transition: all 0.2s;
  display:flex; flex-direction:column; gap:8px; min-height:82px;
  position:relative;
}
.cal-day:hover{ transform: translateY(-2px); box-shadow: var(--lift-1); border-color: rgba(46,58,86,0.18); }
.cal-day.today{
  background: linear-gradient(160deg, rgba(78,91,122,0.95), rgba(107,132,96,0.9));
  border-color: transparent; color:#fff;
  box-shadow: 0 12px 28px rgba(78,91,122,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
}
.cal-day.past{ opacity: 0.55; }
.cal-day-top{ display:flex; align-items:baseline; justify-content:space-between; gap:6px; }
.cal-dow{ font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; color:var(--ink-3); }
.cal-day.today .cal-dow{ color:rgba(255,255,255,0.8); }
.cal-dnum{ font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); font-family:'Cormorant Garamond',serif; }
.cal-day.today .cal-dnum{ color:#fff; }
.cal-day-chips{ display:flex; gap:3px; flex-wrap:wrap; }
.cal-chip-pip{ width:6px; height:6px; border-radius:50%; background:var(--ink-3); opacity:0.5; }
.cal-day.today .cal-chip-pip{ background:#fff; opacity:0.75; }
.cal-chip-pip.hcp{ background: var(--a-sage,#6B8460); opacity:0.85; }
.cal-chip-pip.focus{ background: var(--a-amber,#A68B55); opacity:0.85; }
.cal-chip-pip.risk{ background: #B85C3C; opacity:0.9; }
.cal-day.today .cal-chip-pip.hcp,
.cal-day.today .cal-chip-pip.focus,
.cal-day.today .cal-chip-pip.risk{ background:#fff; opacity:1; }
.cal-day-count{ font-size:11px; color:var(--ink-3); font-family:'JetBrains Mono',monospace; letter-spacing:0.06em; margin-top:auto; }
.cal-day.today .cal-day-count{ color:rgba(255,255,255,0.85); }

/* Day view */
.cal-day-view{
  background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
  border:1px solid var(--line); border-radius: var(--r-lg);
  box-shadow: var(--lift-1);
  overflow:hidden;
  position:relative;
}
.cal-day-head{
  padding: 18px 22px 14px; display:flex; align-items:baseline; justify-content:space-between;
  border-bottom: 1px solid var(--line-2);
  background: linear-gradient(180deg, rgba(248,247,242,0.6), transparent);
}
.cal-day-head-left{ display:flex; align-items:baseline; gap:12px; }
.cal-day-head h2{ font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); }
.cal-day-head-sub{ font-size:12px; color:var(--ink-3); font-family:'JetBrains Mono',monospace; letter-spacing:0.06em; }
.cal-nav{ display:flex; gap:4px; }
.cal-nav-btn{ width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:var(--ink-3); transition: all 0.15s; }
.cal-nav-btn:hover{ background: rgba(46,58,86,0.08); color:var(--ink); }

.cal-timeline{ padding: 14px 22px 22px; position:relative; }
.cal-now-line{
  position:absolute; left:0; right:0; height:2px;
  background: linear-gradient(90deg, #B85C3C 0%, rgba(184,92,60,0.3) 80%, transparent);
  z-index:3; pointer-events:none;
}
.cal-now-line::before{
  content:''; position:absolute; left:78px; top:-4px; width:10px; height:10px; border-radius:50%;
  background:#B85C3C; box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 14px rgba(184,92,60,0.6);
}
.cal-now-line::after{
  content: 'NOW'; position:absolute; left:18px; top:-9px;
  font-size:9px; font-weight:800; letter-spacing:0.18em; color:#B85C3C;
  font-family:'JetBrains Mono',monospace;
  background: rgba(255,255,255,0.95); padding:2px 6px; border-radius:99px;
  border: 1px solid rgba(184,92,60,0.3);
}
.cal-row{
  display:grid; grid-template-columns: 72px 1fr; gap:14px;
  align-items:start; min-height: 46px;
  border-top: 1px dashed rgba(46,58,86,0.1);
  padding: 10px 0 6px;
  position:relative;
}
.cal-row:first-of-type{ border-top: 0; padding-top: 0; }
.cal-hour{
  font-size:11px; font-weight:600; color:var(--ink-4); font-family:'JetBrains Mono',monospace;
  letter-spacing:0.08em; padding-top:2px;
}
.cal-slots{ display:flex; flex-direction:column; gap:6px; }

.cal-event{
  position:relative;
  border-radius: 10px;
  padding: 10px 14px;
  border: 1px solid var(--e-border, rgba(46,58,86,0.14));
  background: var(--e-bg, rgba(255,255,255,0.7));
  box-shadow: 0 2px 8px rgba(31,36,50,0.04);
  cursor:pointer;
  text-align:left; width:100%;
  transition: all 0.15s;
  overflow:hidden;
}
.cal-event::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--e-accent, var(--a-indigo));
  border-radius: 2px 0 0 2px;
}
.cal-event:hover{ transform: translateY(-1px); box-shadow: 0 6px 18px rgba(31,36,50,0.1); border-color: var(--e-accent); }
.cal-event.selected{
  background: var(--e-bg-sel, linear-gradient(135deg, rgba(78,91,122,0.12), rgba(107,132,96,0.08)));
  border-color: var(--e-accent); box-shadow: 0 6px 22px rgba(31,36,50,0.1);
}
.cal-event-top{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:2px; }
.cal-event-time{ font-size:10px; font-weight:700; color: var(--e-accent, var(--a-indigo)); font-family:'JetBrains Mono',monospace; letter-spacing:0.1em; }
.cal-event-dur{ font-size:10px; color:var(--ink-4); font-family:'JetBrains Mono',monospace; }
.cal-event-title{ font-size:13px; font-weight:600; color:var(--ink); line-height:1.3; }
.cal-event-sub{ font-size:11.5px; color:var(--ink-3); margin-top:2px; display:flex; align-items:center; gap:6px; }
.cal-event-badge{ font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; padding:2px 6px; border-radius:99px; background: rgba(46,58,86,0.08); color:var(--ink-2); font-family:'JetBrains Mono',monospace; }
.cal-event-badge.hcp{ background: rgba(107,132,96,0.18); color:#4A5F40; }
.cal-event-badge.focus{ background: rgba(166,139,85,0.18); color:#7A6230; }
.cal-event-badge.risk{ background: rgba(184,92,60,0.14); color:#8A3F22; }
.cal-event-attendees{ display:flex; margin-left:auto; }
.cal-att{ width:20px; height:20px; border-radius:50%; border:2px solid #fff; margin-left:-6px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; background: linear-gradient(135deg, var(--a-indigo), var(--a-sage)); }

.cal-event.current{
  background: linear-gradient(135deg, rgba(184,92,60,0.08), rgba(255,255,255,0.9));
  border-color: rgba(184,92,60,0.35);
}
.cal-event.current .cal-event-time{ color:#B85C3C; }
.cal-event.current::before{ background:#B85C3C; }

.cal-event.focus-block{
  background: repeating-linear-gradient(135deg, rgba(166,139,85,0.08) 0, rgba(166,139,85,0.08) 8px, rgba(166,139,85,0.04) 8px, rgba(166,139,85,0.04) 16px);
  border-color: rgba(166,139,85,0.28); border-style: dashed;
}

/* Agent rail (right) */
.cal-rail{
  display:flex; flex-direction:column; gap:16px;
  position:sticky; top:20px;
  align-self:start;
}
.cal-agent-card{
  background: linear-gradient(160deg, rgba(107,132,96,0.98), rgba(78,91,122,0.95));
  border-radius: var(--r-lg);
  padding: 20px 22px;
  color:#fff;
  position:relative; overflow:hidden;
  box-shadow: 0 16px 44px rgba(78,91,122,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
}
.cal-agent-card::before{
  content:''; position:absolute; top:-40px; right:-40px;
  width:180px; height:180px; border-radius:50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 65%);
  pointer-events:none;
}
.cal-agent-label{ font-size:10px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; opacity:0.85; display:flex; align-items:center; gap:8px; margin-bottom:14px; position:relative; z-index:1; }
.cal-agent-label::before{ content:''; width:6px; height:6px; border-radius:50%; background:#fff; box-shadow:0 0 10px #fff; animation:pulse 1.4s infinite; }
.cal-agent-hero{ font-size:18px; font-weight:600; line-height:1.35; letter-spacing:-0.015em; margin-bottom:14px; position:relative; z-index:1; }
.cal-agent-hero em{ font-style:italic; font-weight:500; }
.cal-actions{ display:flex; flex-direction:column; gap:8px; position:relative; z-index:1; }
.cal-action{
  display:flex; align-items:center; gap:10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.14); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  text-align:left;
  color:#fff; transition: all 0.15s;
}
.cal-action:hover{ background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.3); transform: translateX(2px); }
.cal-action-icon{
  width:28px; height:28px; border-radius:8px;
  background: rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.cal-action-icon svg{ width:14px; height:14px; }
.cal-action-body{ flex:1; min-width:0; }
.cal-action-label{ font-size:12px; font-weight:600; line-height:1.3; }
.cal-action-detail{ font-size:10.5px; opacity:0.8; margin-top:1px; }
.cal-action-chevron{ opacity:0.6; flex-shrink:0; }
.cal-agent-foot{
  margin-top:14px; padding-top:12px; border-top:1px dashed rgba(255,255,255,0.2);
  font-size:11px; opacity:0.8; position:relative; z-index:1;
  display:flex; align-items:center; justify-content:space-between;
}
.cal-agent-open{ color:#fff; font-weight:600; display:flex; align-items:center; gap:4px; }

/* Event detail card */
.cal-detail{
  background: rgba(255,255,255,0.82); backdrop-filter: blur(10px);
  border:1px solid var(--line); border-radius: var(--r-lg);
  box-shadow: var(--lift-1);
  padding: 20px 22px;
  position:relative;
}
.cal-detail-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
.cal-detail-time{ font-size:11px; color:var(--ink-3); font-family:'JetBrains Mono',monospace; letter-spacing:0.08em; margin-bottom:6px; }
.cal-detail-title{ font-size:17px; font-weight:700; letter-spacing:-0.015em; color:var(--ink); line-height:1.3; }
.cal-detail-where{ font-size:12px; color:var(--ink-3); margin-top:4px; }
.cal-detail-section{ margin-top:14px; padding-top:12px; border-top:1px dashed var(--line-2); }
.cal-detail-sec-label{ font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-3); font-family:'JetBrains Mono',monospace; margin-bottom:8px; }
.cal-attendees{ display:flex; flex-direction:column; gap:8px; }
.cal-attendee{ display:flex; align-items:center; gap:10px; }
.cal-attendee-av{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
.cal-attendee-body{ flex:1; min-width:0; }
.cal-attendee-name{ font-size:12.5px; font-weight:600; color:var(--ink); }
.cal-attendee-role{ font-size:11px; color:var(--ink-3); }
.cal-attendee-status{ font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; padding:2px 6px; border-radius:99px; }
.cal-attendee-status.accepted{ background:rgba(107,132,96,0.18); color:#4A5F40; }
.cal-attendee-status.tentative{ background:rgba(166,139,85,0.18); color:#7A6230; }
.cal-attendee-status.pending{ background:rgba(46,58,86,0.08); color:var(--ink-3); }

.cal-detail-ctas{ display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:14px; }
.cal-cta{
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:10px 12px; border-radius:10px;
  font-size:12px; font-weight:600; text-align:center;
  transition: all 0.15s;
}
.cal-cta.primary{
  background: var(--ink); color:#fff;
  box-shadow: 0 4px 14px rgba(31,36,50,0.25);
}
.cal-cta.primary:hover{ transform: translateY(-1px); box-shadow: 0 8px 22px rgba(31,36,50,0.35); }
.cal-cta.ghost{
  background: rgba(255,255,255,0.8); color:var(--ink); border:1px solid var(--line);
}
.cal-cta.ghost:hover{ background:#fff; border-color: rgba(46,58,86,0.2); }
.cal-cta.warn{
  background: linear-gradient(135deg, #B85C3C, #D17A5A); color:#fff;
  box-shadow: 0 4px 14px rgba(184,92,60,0.4);
}
.cal-cta.warn:hover{ transform: translateY(-1px); box-shadow: 0 8px 22px rgba(184,92,60,0.5); }
.cal-cta svg{ width:13px; height:13px; }
.cal-cta.full{ grid-column: 1/-1; }

.cal-prep{
  margin-top:12px; padding:12px 14px;
  background: linear-gradient(135deg, rgba(168,184,154,0.22), rgba(168,184,154,0.08));
  border: 1px solid rgba(107,132,96,0.25);
  border-radius: 10px;
  font-size:12px; color:var(--ink-2); line-height:1.5;
}
.cal-prep strong{ color:var(--ink); font-weight:600; }
.cal-prep-label{ font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color: #4A5F40; font-family:'JetBrains Mono',monospace; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.cal-prep-label::before{ content:''; width:5px; height:5px; border-radius:50%; background:#4A5F40; }

.cal-toast{
  position: fixed; bottom: 28px; left: 50%; transform: translate(-50%, 20px);
  background: linear-gradient(135deg, #2E3A56, #3A4766);
  color:#fff; padding: 12px 20px; border-radius: 99px;
  font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
  box-shadow: 0 14px 40px rgba(46,58,86,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
  z-index: 1000; opacity: 0;
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  max-width: min(520px, 90vw);
}
.cal-toast.in{ opacity: 1; transform: translate(-50%, 0); }

/* ============================================================
   CAMPAIGNS / HCPs / LIBRARY — common table card
   ============================================================ */
.page{ max-width:1320px; margin:0 auto; padding:36px 40px 80px; }
.page-head{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px; gap:20px; flex-wrap:wrap; }
.page-title{ font-size:clamp(36px,4vw,48px); font-weight:700; letter-spacing:-0.03em; color:var(--ink); line-height:1.05; }
.page-title em{ font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; background: var(--grad-aurora); -webkit-background-clip:text; background-clip:text; color:transparent; }
.page-sub{ font-size:15px; color:var(--ink-2); margin-top:8px; max-width:560px; line-height:1.5; }
.page-actions{ display:flex; gap:8px; }
.page-cta{ padding:10px 18px; border-radius:99px; background:var(--ink); color:#fff; font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; transition: background 0.15s; }
.page-cta:hover{ background:var(--a-indigo); }
.page-cta.ghost{ background:rgba(255,255,255,0.7); color:var(--ink); border:1px solid var(--line); }
.page-cta.ghost:hover{ background:#fff; }

.page-tabs{ display:flex; gap:4px; margin-bottom:22px; }
.page-tab{ padding:8px 14px; border-radius:99px; font-size:13px; font-weight:500; color:var(--ink-3); border:1px solid transparent; }
.page-tab.active{ background:#fff; color:var(--ink); border-color:var(--line); box-shadow:var(--lift-1); font-weight:600; }

.quick-kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px; }
.kpi-chip{
  background: rgba(255,255,255,0.75); backdrop-filter:blur(10px);
  border: 1px solid var(--line); border-radius:var(--r-md);
  padding:16px 18px; box-shadow: var(--lift-1);
  position:relative; overflow:hidden;
}
