.kpi-chip::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(180deg, var(--k-accent, #4E5B7A), var(--k-accent2, #6E7C9A)); }
.kpi-chip-label{ font-size:11px; font-weight:600; letter-spacing:0.14em; color:var(--ink-3); text-transform:uppercase; font-family:'JetBrains Mono',monospace; margin-bottom:8px; }
.kpi-chip-value{ font-size:26px; font-weight:800; letter-spacing:-0.02em; color:var(--ink); font-variant-numeric:tabular-nums; }
.kpi-chip-delta{ font-size:11px; font-weight:600; color:var(--ink-3); margin-top:3px; }
.kpi-chip-delta.up{ color:#4F7A4A; }
.kpi-chip-delta.down{ color:#6B8460; }

.data-card{
  background: rgba(255,255,255,0.85); backdrop-filter:blur(8px);
  border:1px solid var(--line); border-radius:var(--r-lg);
  box-shadow: var(--lift-1); overflow:hidden;
}
.data-row{
  display:grid; gap:16px; align-items:center;
  padding:16px 22px; border-bottom:1px solid var(--line-2);
  transition: background 0.15s;
}
.data-row:last-child{ border-bottom:0; }
.data-row:hover{ background:rgba(46,58,86,0.04); }
.data-head{ background: rgba(248,247,242,0.5); font-size:10px; font-weight:700; letter-spacing:0.14em; color:var(--ink-3); text-transform:uppercase; font-family:'JetBrains Mono',monospace; padding-top:12px; padding-bottom:12px; }
.data-head:hover{ background:rgba(248,247,242,0.5); }

/* Campaigns layout */
.campaigns-row{ grid-template-columns: 2fr 1fr 1fr 1fr 1fr 36px; }
.camp-name{ display:flex; flex-direction:column; gap:2px; }
.camp-name-title{ font-size:14px; font-weight:600; color:var(--ink); }
.camp-name-sub{ font-size:12px; color:var(--ink-3); }
.camp-flag{ display:inline-flex; align-items:center; gap:6px; }
.camp-status{ display:inline-flex; padding:4px 10px; border-radius:99px; font-size:11px; font-weight:600; letter-spacing:0.03em; }
.camp-status.on{ background:rgba(79,122,74,0.14); color:#3F6138; }
.camp-status.risk{ background:rgba(107,132,96,0.18); color:#4A5F40; }
.camp-status.paused{ background:rgba(46,58,86,0.12); color:var(--ink-2); }
.camp-bar{ position:relative; height:6px; background:rgba(46,58,86,0.08); border-radius:99px; overflow:hidden; }
.camp-bar-fill{ position:absolute; inset:0 auto 0 0; background: linear-gradient(90deg, var(--k-accent, #4E5B7A), var(--k-accent2, #6B8460)); border-radius:99px; }
.camp-num{ font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; }
.camp-chevron{ color:var(--ink-4); font-size:14px; }

/* HCPs layout */
.hcps-row{ grid-template-columns: 2fr 1fr 1fr 1fr 1fr 36px; }
.hcp-ident{ display:flex; align-items:center; gap:12px; }
.hcp-avatar{ width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }
.hcp-ident-text{ display:flex; flex-direction:column; }
.hcp-name{ font-size:14px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:6px; }
.hcp-name-badge{ font-size:9px; font-weight:700; letter-spacing:0.1em; padding:2px 6px; border-radius:99px; background:linear-gradient(135deg,#6B8460,#A8B89A); color:#fff; text-transform:uppercase; }
.hcp-meta{ font-size:12px; color:var(--ink-3); }
.hcp-tier{ display:inline-flex; padding:4px 10px; border-radius:99px; font-size:11px; font-weight:600; background:rgba(46,58,86,0.1); color:var(--ink-2); font-variant-numeric:tabular-nums; }
.hcp-tier.a{ background:rgba(107,132,96,0.18); color:#4A5F40; }
.hcp-engage-dots{ display:flex; gap:3px; }
.hcp-engage-dot{ width:14px; height:6px; border-radius:99px; background:rgba(46,58,86,0.12); }
.hcp-engage-dot.on{ background: linear-gradient(90deg,#4E5B7A,#6B8460); }

/* Library layout */
.lib-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:18px; }
.lib-card{
  background: rgba(255,255,255,0.85); backdrop-filter:blur(8px);
  border:1px solid var(--line); border-radius:var(--r-lg);
  box-shadow: var(--lift-1); overflow:hidden;
  display:flex; flex-direction:column;
  transition: all 0.2s ease; cursor:pointer;
}
.lib-card:hover{ transform:translateY(-3px); box-shadow: var(--lift-2); }
.lib-thumb{
  aspect-ratio: 16/10;
  background: linear-gradient(135deg, var(--t1,#4E5B7A) 0%, var(--t2,#6E7C9A) 100%);
  position:relative; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.lib-thumb::before{
  content:''; position:absolute; top:-40px; right:-40px;
  width:160px; height:160px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.5), transparent 60%);
  filter: blur(6px);
}
.lib-thumb svg{ color:#fff; opacity:0.85; position:relative; z-index:1; width:44px; height:44px; }
.lib-thumb-badge{
  position:absolute; top:12px; left:12px; z-index:2;
  padding:4px 10px; border-radius:99px; background:rgba(255,255,255,0.9); backdrop-filter:blur(6px);
  font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink);
}
.lib-body{ padding:18px; flex:1; display:flex; flex-direction:column; gap:8px; }
.lib-title{ font-size:15px; font-weight:600; color:var(--ink); line-height:1.35; }
.lib-meta{ font-size:12px; color:var(--ink-3); display:flex; align-items:center; gap:8px; margin-top:auto; padding-top:12px; border-top:1px solid var(--line-2); }
.lib-meta-dot{ width:4px; height:4px; border-radius:50%; background:var(--ink-4); }
.lib-status{ display:inline-flex; font-size:11px; font-weight:600; padding:3px 9px; border-radius:99px; }
.lib-status.approved{ background:rgba(79,122,74,0.14); color:#3F6138; }
.lib-status.draft{ background:rgba(46,58,86,0.1); color:var(--ink-2); }
.lib-status.review{ background:rgba(107,132,96,0.18); color:#4A5F40; }

/* Deadlines list */
.deadline-row{ grid-template-columns: auto 1fr auto auto 36px; gap:16px; align-items:center; }
.deadline-clock{ width:40px; height:40px; border-radius:12px; background: linear-gradient(140deg, var(--d-c,#6B8460), var(--d-c2,#A8B89A)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-family:'JetBrains Mono',monospace; font-weight:700; letter-spacing:0.04em; }
.deadline-body h4{ font-size:14px; font-weight:600; color:var(--ink); margin-bottom:2px; }
.deadline-body p{ font-size:12px; color:var(--ink-3); }
.deadline-time{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-2); font-weight:600; }
.deadline-owner{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-3); }

.wec-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.wec-card{
  background: rgba(255,255,255,0.85); backdrop-filter:blur(8px);

  display:flex; flex-direction:column; gap:10px;
  transition: all 0.2s;
}
.wec-card:hover{ transform:translateY(-2px); box-shadow:var(--lift-2); }
.wec-head{ display:flex; align-items:center; justify-content:space-between; }
.wec-flag{ font-size:26px; }
.wec-status-dot{ width:8px; height:8px; border-radius:50%; }
.wec-status-dot.on{ background:#4F7A4A; box-shadow:0 0 10px rgba(79,122,74,0.5); }
.wec-status-dot.risk{ background:#6B8460; box-shadow:0 0 10px rgba(107,132,96,0.5); }
.wec-status-dot.paused{ background:#A7B0BE; }
.wec-name{ font-size:15px; font-weight:700; color:var(--ink); }
.wec-meta{ font-size:12px; color:var(--ink-3); display:flex; gap:12px; }
.wec-meta strong{ color:var(--ink); font-variant-numeric:tabular-nums; }
</style>
</head>

function applyGreeting(){
  const h = new Date().getHours();
  let greet = 'Good morning', note = "Your overnight briefing is ready. Two wins, one at-risk campaign, and Dr. Keller's 14:30 is waiting on Pre-Call Intel.";
  if(h >= 12 && h < 18){ greet = 'Good afternoon'; note = "Four agents working in the background. Dr. Keller's 14:30 is prepped and the Belgium plan is on Sophie's desk."; }
  else if(h >= 18 || h < 5){ greet = 'Good evening'; note = "Today's cluster is quiet. Tomorrow's briefing will be ready by 07:00."; }
  const w = document.getElementById('dash-greeting-word'); if(w) w.textContent = greet;
  const s = document.getElementById('dash-sub'); if(s) s.textContent = note;
  const we = document.getElementById('w-greeting'); if(we) we.textContent = greet + ',';
  const de = document.getElementById('dash-eyebrow');
  if(de){
    const d = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    de.textContent = `${days[d.getDay()]} · ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} · WEC Cluster`;
  }
}

function calToast(msg){
  const existing = document.querySelector('.cal-toast'); if(existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'cal-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('in'));
  setTimeout(()=>{ t.classList.remove('in'); setTimeout(()=>t.remove(),300); }, 2800);
}
document.addEventListener('cal-toast', e=>calToast(e.detail));

function streamInto(id, html){
  const el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = '';
  const doc = new DOMParser().parseFromString(`<div>${html}</div>`, 'text/html');
  const wrap = doc.body.firstChild;
  el.appendChild(wrap.cloneNode(false));
  const target = el.firstChild;
  const nodes = Array.from(wrap.childNodes);
  let ni = 0;
  function revealNext(){
    if(ni >= nodes.length){
      const c = el.querySelector('.stream-cursor'); if(c) c.remove(); return;
    }
    target.appendChild(nodes[ni].cloneNode(true));
    let c = el.querySelector('.stream-cursor'); if(c) c.remove();
    c = document.createElement('span'); c.className='stream-cursor'; target.appendChild(c);
    ni++; el.scrollTop = el.scrollHeight;
    setTimeout(revealNext, 40 + Math.random()*60);
  }
  revealNext();
}

function go(dest){
  if(dest==='dashboard'){ currentScreen='dashboard'; renderDashboard(); }
  else if(dest==='inbox'){ currentScreen='inbox'; renderInbox(); }
  else if(dest==='calendar'){ currentScreen='calendar'; renderCalendar(); }
  else if(dest==='campaigns'){ currentScreen='campaigns'; renderCampaigns(); }
  else if(dest==='hcps'){ currentScreen='hcps'; renderHCPs(); }
  else if(dest==='library'){ currentScreen='library'; renderLibrary(); }
  else if(dest==='deadlines'){ currentScreen='deadlines'; renderDeadlines(); }
  else if(dest==='countries'){ currentScreen='countries'; renderCountries(); }
  else if(dest && dest.startsWith('agent:')){ currentScreen=dest; renderAgent(dest.split(':')[1]); }
}

function wireScreen(){
  document.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.preventDefault(); go(el.dataset.goto); });
  });
  document.querySelectorAll('[data-email]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const em = EMAILS.find(e=>e.id===el.dataset.email);
      if(em){ selectedEmail = em; renderInbox(); }
    });
  });
}

function tick(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const el = document.getElementById('clock');
  if(el) el.textContent = `${hh}:${mm}:${ss}`;
}
setInterval(tick, 1000); tick();

function applyWelcomeGreeting(){
  const h = new Date().getHours();
  let greet = 'Good morning';
  if(h >= 12 && h < 18) greet = 'Good afternoon';
  else if(h >= 18 || h < 5) greet = 'Good evening';
  const we = document.getElementById('w-greeting'); if(we) we.textContent = greet + ',';
}
applyWelcomeGreeting();

function bootMain(){
  const w = document.getElementById('welcome');
  w.classList.add('hidden');
  main.classList.add('visible');
  renderDashboard();
  setTimeout(()=>{ w.style.display='none'; }, 800);
}
document.getElementById('skip-welcome').addEventListener('click', bootMain);
document.querySelectorAll('.topbar-nav-item[data-goto], #home-btn').forEach(el=>{
  el.addEventListener('click', (e)=>{ e.preventDefault(); go(el.dataset.goto || 'dashboard'); });
});

setTimeout(bootMain, 5000);
